<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0c0c14" />

  <!-- Compass star – thick, high-contrast -->
  <!-- North point -->
  <polygon points="16,2 20,14 16,16 12,14" fill="#d4a843" />
  <!-- South point -->
  <polygon points="16,30 12,18 16,16 20,18" fill="#d4a843" opacity="0.5" />
  <!-- East point -->
  <polygon points="30,16 18,12 16,16 18,20" fill="#d4a843" opacity="0.75" />
  <!-- West point -->
  <polygon points="2,16 14,12 16,16 14,20" fill="#d4a843" opacity="0.75" />

  <!-- Center hub -->
  <circle cx="16" cy="16" r="3" fill="#0c0c14" />
  <circle cx="16" cy="16" r="1.5" fill="#d4a843" />
</svg>
